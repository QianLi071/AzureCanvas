<!DOCTYPE html>
<html lang="zh">
<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    .club-page { max-width: 860px; margin: 0 auto; padding: 24px 20px; }
    .club-hero {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px 28px 20px;
      display: flex; align-items: flex-start; gap: 20px; margin-bottom: 20px;
    }
    .club-hero-emblem {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--bg-inset); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem; flex-shrink: 0;
    }
    .club-hero-info { flex: 1; }
    .club-hero-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .club-hero-desc { font-size: 0.92rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 12px; }
    .club-hero-stats { display: flex; gap: 20px; }
    .club-stat { font-size: 0.85rem; color: var(--text-muted); }
    .club-stat strong { color: var(--text); font-size: 1rem; }
    .club-join-btn {
      flex-shrink: 0; padding: 8px 22px;
      background: var(--text); color: #fff; border: none;
      border-radius: var(--radius); font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: var(--transition); font-family: inherit;
    }
    .club-join-btn:hover { background: #333; }
    .club-join-btn.joined { background: var(--bg-inset); color: var(--text); border: 1px solid var(--border); }

    /* tabs */
    .club-tabs {
      display: flex; gap: 0; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      overflow: hidden; margin-bottom: 20px;
    }
    .club-tab {
      flex: 1; padding: 12px 8px; text-align: center;
      font-size: 0.92rem; font-weight: 500; cursor: pointer;
      border: none; background: none; color: var(--text-muted);
      transition: var(--transition); font-family: inherit;
      border-right: 1px solid var(--border);
    }
    .club-tab:last-child { border-right: none; }
    .club-tab:hover { background: var(--hover-bg); color: var(--text); }
    .club-tab.active { background: var(--bg-inset); color: var(--text); font-weight: 600; }

    /* tab panels */
    .club-panel { display: none; }
    .club-panel.active { display: block; }

    /* intro panel */
    .intro-section { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
    .intro-section-title { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; border-bottom: 1px solid var(--border-muted); padding-bottom: 8px; }
    .leader-card { display: flex; align-items: center; gap: 14px; }
    .leader-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--bg-inset); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 700; flex-shrink: 0; }
    .leader-info .leader-name { font-weight: 600; font-size: 1rem; }
    .leader-info .leader-meta { font-size: 0.82rem; color: var(--text-muted); }
    .members-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .member-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--bg-inset); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 600; cursor: default; position: relative; }
    .member-avatar:hover::after { content: attr(data-name); position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; white-space: nowrap; pointer-events: none; }

    /* activity panel */
    .activity-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 12px; display: flex; gap: 16px; align-items: flex-start; }
    .activity-date-block { flex-shrink: 0; text-align: center; background: var(--bg-inset); border-radius: var(--radius); padding: 8px 14px; border: 1px solid var(--border-muted); }
    .activity-month { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; }
    .activity-day { font-size: 1.6rem; font-weight: 700; line-height: 1; }
    .activity-info { flex: 1; }
    .activity-title { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .activity-meta { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 8px; display: flex; gap: 14px; flex-wrap: wrap; }
    .activity-desc { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 10px; }
    .activity-spots { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; }
    .spots-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; }
    .spots-fill { height: 100%; background: var(--text); border-radius: 2px; transition: width 0.4s ease; }
    .book-btn { padding: 6px 18px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg); font-size: 0.85rem; cursor: pointer; transition: var(--transition); font-family: inherit; color: var(--text); white-space: nowrap; }
    .book-btn:hover { background: var(--text); color: #fff; border-color: var(--text); }
    .book-btn.booked { background: var(--bg-inset); color: var(--text-muted); cursor: default; }

    /* forum panel */
    .forum-input-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 14px; }
    .forum-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.92rem; background: var(--bg-subtle); color: var(--text); resize: none; outline: none; font-family: inherit; min-height: 72px; transition: var(--transition); }
    .forum-input:focus { background: var(--bg); border-color: #888; }
    .forum-input-footer { display: flex; justify-content: flex-end; margin-top: 10px; }
    .forum-post-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 10px; }
    .forum-post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .forum-post-body { font-size: 0.95rem; line-height: 1.7; margin-bottom: 10px; }
    .forum-post-actions { display: flex; gap: 4px; padding-top: 8px; border-top: 1px solid var(--border-muted); }
    .forum-comments { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-muted); display: none; }
    .forum-comments.open { display: block; }
    .forum-comment-item { padding: 6px 0; border-bottom: 1px solid var(--border-muted); font-size: 0.875rem; }
    .forum-comment-item:last-child { border-bottom: none; }
    .forum-comment-author { font-weight: 600; margin-right: 6px; }
    .forum-comment-input-row { display: flex; gap: 8px; margin-top: 10px; }
    .forum-comment-input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.85rem; background: var(--bg-subtle); color: var(--text); outline: none; font-family: inherit; }
    .forum-comment-input:focus { background: var(--bg); border-color: #888; }

    /* chat panel */
    .chat-apply-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px 20px; text-align: center; }
    .chat-apply-icon { font-size: 2.8rem; margin-bottom: 14px; }
    .chat-apply-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
    .chat-apply-sub { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 20px; }
    .chat-apply-btn { padding: 10px 32px; background: var(--text); color: #fff; border: none; border-radius: var(--radius); font-size: 0.95rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: var(--transition); }
    .chat-apply-btn:hover { background: #333; }
    .chat-apply-btn:disabled { background: var(--bg-inset); color: var(--text-muted); cursor: default; }
    .chat-status { margin-top: 14px; font-size: 0.85rem; color: var(--text-muted); min-height: 20px; }
    .chat-room { display: none; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .chat-room.open { display: flex; flex-direction: column; }
    .chat-room-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
    .chat-online-dot { width: 8px; height: 8px; border-radius: 50%; background: #2da44e; }
    .chat-messages { height: 320px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .chat-msg { display: flex; gap: 10px; align-items: flex-end; }
    .chat-msg-mine { flex-direction: row-reverse; }
    .chat-msg-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--bg-inset); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; flex-shrink: 0; }
    .chat-bubble { padding: 8px 14px; border-radius: 18px; font-size: 0.88rem; max-width: 65%; line-height: 1.5; }
    .chat-bubble-theirs { background: var(--bg-inset); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .chat-bubble-mine { background: var(--text); color: #fff; border-bottom-right-radius: 4px; }
    .chat-input-bar { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }
    .chat-input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.9rem; background: var(--bg-subtle); color: var(--text); outline: none; font-family: inherit; }
    .chat-input:focus { background: var(--bg); border-color: #888; }
  </style>
</head>

<div class="club-page">

      </div>
    </div>
    <button class="club-join-btn" id="joinBtn">+ 加入社团</button>
  </div>

  <div class="club-tabs">
    <button class="club-tab active" data-tab="intro"><i class="fas fa-info-circle"></i> 社团介绍</button>

    <button class="club-tab" data-tab="chat"><i class="fas fa-comment-dots"></i> 社团聊天</button>
  </div>

  <!-- intro panel -->
  <div class="club-panel active" id="panel-intro">
    <div class="intro-section">
      <div class="intro-section-title">社团简介</div>
      <div id="introFullDesc" style="font-size:0.95rem;line-height:1.8;color:var(--text)"></div>

    <div class="intro-section">

      <div class="leader-card">

          <div class="leader-name" id="leaderName"></div>

        </div>

    </div>
    <div class="intro-section">

      <div class="members-row" id="membersRow"></div>
    </div>
  </div>

  <!-- activity panel -->
  <div class="club-panel" id="panel-activity">
    <div id="activityList"></div>
  </div>

  <!-- forum panel -->
  <div class="club-panel" id="panel-forum">
    <div class="forum-input-card">

      <div class="forum-input-footer">
        <button class="btn btn-primary btn-sm" id="forumPostBtn">发布</button>
      </div>
    </div>
    <div id="forumList"></div>
  </div>

    <div class="chat-apply-box" id="chatApplyBox">

      <div class="chat-apply-title">加入社团聊天室</div>
      <div class="chat-apply-sub">申请通过社团管理员审核后，即可与社团成员实时聊天</div>
      <button class="chat-apply-btn" id="chatApplyBtn">申请加入</button>
      <div class="chat-status" id="chatStatus"></div>
    </div>
    <div class="chat-room" id="chatRoom">
      <div class="chat-room-header">
        <div class="chat-online-dot"></div>
        <span id="chatRoomTitle"></span>
        <span style="font-size:0.78rem;color:var(--text-muted);margin-left:auto" id="chatOnlineCount"></span>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-bar">
        <input class="chat-input" id="chatInput" placeholder="发送消息…" autocomplete="off">
        <button class="btn btn-primary btn-sm" id="chatSendBtn">发送</button>
      </div>
    </div>
  </div>
</div>

      {from:'陈乐天',text:'还有少量票，找我领',mine:false},
    ]
  },
  {
    id:7, name:'IEEE学生分会', emoji:'⚡',
    desc:'IEEE学生分会是国际电气电子工程师学会在校学生组织，致力于推动电子、计算机、通信等领域的学术交流与技术创新。',
    leader:{name:'刘科远', grade:'大三', dept:'电子信息学院'},
    members:['苗','凤','花','方','俞','任','袁','柳','酆','鲍'],
    memberCount:68,
    activities:[
      {id:1,title:'嵌入式系统开发讲座',date:'2026-05-06',time:'19:00',location:'工程楼报告厅',desc:'业界专家分享实战经验',spots:80,booked:75},
      {id:2,title:'电子设计竞赛培训',date:'2026-05-13',time:'14:00',location:'实验楼301',desc:'备战全国大学生电子设计竞赛',spots:25,booked:20},
    ],
    chatMsgs:[
      {from:'刘科远',text:'讲座嘉宾已确认，来自华为研究院',mine:false},
      {from:'苗志远',text:'太强了！我已经报名了',mine:false},
    ]
  }
];

document.addEventListener('DOMContentLoaded', () => {

// ===== init =====
const params = new URLSearchParams(location.search);
const clubId = parseInt(params.get('id') || '0');
const club = CLUBS.find(c => c.id === clubId) || CLUBS[0];

// night mode
const nightBtn = document.getElementById('nightBtn');
const isNight = localStorage.getItem('th_night_mode') === '1';
if (isNight) document.body.classList.add('night-mode');
nightBtn.addEventListener('click', () => {
  document.body.classList.toggle('night-mode');
  localStorage.setItem('th_night_mode', document.body.classList.contains('night-mode') ? '1' : '0');
});

// populate hero
document.getElementById('heroEmblem').textContent = club.emoji;
document.getElementById('heroName').textContent = club.name;
document.getElementById('heroDesc').textContent = club.desc.slice(0, 60) + '…';
document.getElementById('heroMemberCount').textContent = club.memberCount;
document.getElementById('heroActivityCount').textContent = club.activities.length;
document.getElementById('chatRoomTitle').textContent = club.name + ' 聊天室';
document.getElementById('chatOnlineCount').textContent = Math.floor(Math.random()*8+3) + ' 人在线';

// join btn
const joinKey = 'club_joined_' + club.id;
const joinBtn = document.getElementById('joinBtn');
function updateJoinBtn() {
  const joined = localStorage.getItem(joinKey);
  joinBtn.textContent = joined ? '✓ 已加入' : '+ 加入社团';
  joinBtn.className = 'club-join-btn' + (joined ? ' joined' : '');
}
updateJoinBtn();
joinBtn.addEventListener('click', () => {
  const joined = localStorage.getItem(joinKey);
  if (joined) localStorage.removeItem(joinKey);
  else localStorage.setItem(joinKey, '1');
  updateJoinBtn();
});

// tabs
document.querySelectorAll('.club-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.club-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.club-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// ===== intro =====
document.getElementById('introFullDesc').textContent = club.desc;
const ldr = club.leader;
document.getElementById('leaderAvatar').textContent = ldr.name[0];
document.getElementById('leaderName').textContent = ldr.name;
document.getElementById('leaderMeta').textContent = ldr.dept + ' · ' + ldr.grade;
const membersRow = document.getElementById('membersRow');
club.members.forEach(m => {
  const el = document.createElement('div');
  el.className = 'member-avatar';
  el.textContent = m;
  el.setAttribute('data-name', m + '同学');
  membersRow.appendChild(el);
});

// ===== activities =====
const activityList = document.getElementById('activityList');
const bookedKey = 'club_booked_' + club.id;
let bookedSet = new Set(JSON.parse(localStorage.getItem(bookedKey) || '[]'));

function renderActivities() {
  activityList.innerHTML = club.activities.map(act => {
    const d = new Date(act.date);
    const month = d.toLocaleString('zh', {month:'short'});
    const day = d.getDate();
    const pct = Math.round(act.booked / act.spots * 100);
    const isBooked = bookedSet.has(act.id);
    return `<div class="activity-card">
      <div class="activity-date-block">
        <div class="activity-month">${month}</div>
        <div class="activity-day">${day}</div>
      </div>
      <div class="activity-info">
        <div class="activity-title">${act.title}</div>
        <div class="activity-meta">
          <span><i class="fas fa-clock" style="margin-right:4px"></i>${act.time}</span>
          <span><i class="fas fa-map-marker-alt" style="margin-right:4px"></i>${act.location}</span>
        </div>
        <div class="activity-desc">${act.desc}</div>
        <div class="activity-spots">
          已报名 ${act.booked}/${act.spots} 人
          <div class="spots-bar"><div class="spots-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <button class="book-btn ${isBooked ? 'booked' : ''}" data-act-id="${act.id}">
        ${isBooked ? '✓ 已预约' : '预约'}
      </button>
    </div>`;
  }).join('');
  activityList.querySelectorAll('.book-btn:not(.booked)').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.actId);
      bookedSet.add(id);
      localStorage.setItem(bookedKey, JSON.stringify([...bookedSet]));
      const act = club.activities.find(a => a.id === id);
      if (act) act.booked = Math.min(act.booked + 1, act.spots);
      renderActivities();
    });
  });
}
renderActivities();

// ===== forum =====
const forumKey = 'club_forum_' + club.id;
function getForumPosts() { return JSON.parse(localStorage.getItem(forumKey) || '[]'); }
function saveForumPosts(posts) { localStorage.setItem(forumKey, JSON.stringify(posts)); }

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderForum() {
  const posts = getForumPosts();
  const forumList = document.getElementById('forumList');
  if (!posts.length) {
    forumList.innerHTML = '<div class="empty-tip">还没有帖子，来发第一条吧</div>';
    return;
  }
  forumList.innerHTML = posts.slice().reverse().map((p, ri) => {
    const i = posts.length - 1 - ri;
    const commentsHtml = (p.comments || []).map(c =>
      `<div class="forum-comment-item"><span class="forum-comment-author">${escHtml(c.author)}</span>${escHtml(c.text)}</div>`
    ).join('');
    return `<div class="forum-post-card" data-idx="${i}">
      <div class="forum-post-header">
        <div class="avatar" style="width:36px;height:36px;font-size:0.85rem">${escHtml(p.author[0])}</div>
        <div><div style="font-weight:600;font-size:0.92rem">${escHtml(p.author)}</div><div style="font-size:0.75rem;color:var(--text-muted)">${p.time}</div></div>
      </div>
      <div class="forum-post-body">${escHtml(p.text)}</div>
      <div class="forum-post-actions">
        <button class="action-btn forum-like-btn" data-idx="${i}"><i class="far fa-heart"></i> ${p.likes||0}</button>
        <button class="action-btn forum-cmt-btn" data-idx="${i}"><i class="far fa-comment"></i> ${(p.comments||[]).length} 评论</button>
      </div>
      <div class="forum-comments" id="forum-cmt-${i}">
        ${commentsHtml}
        <div class="forum-comment-input-row">
          <input class="forum-comment-input" placeholder="写评论…" data-idx="${i}">
          <button class="btn btn-sm" data-cmt-idx="${i}">发送</button>
        </div>
      </div>
    </div>`;
  }).join('');

  forumList.querySelectorAll('.forum-like-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      const posts2 = getForumPosts();
      posts2[idx].likes = (posts2[idx].likes || 0) + 1;
      saveForumPosts(posts2);
      renderForum();
    });
  });
  forumList.querySelectorAll('.forum-cmt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      const box = document.getElementById('forum-cmt-' + idx);
      box.classList.toggle('open');
    });
  });
  forumList.querySelectorAll('[data-cmt-idx]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.cmtIdx);
      const input = forumList.querySelector(`.forum-comment-input[data-idx="${idx}"]`);
      const text = input.value.trim();
      if (!text) return;
      const posts2 = getForumPosts();
      if (!posts2[idx].comments) posts2[idx].comments = [];
      posts2[idx].comments.push({ author: '我', text });
      saveForumPosts(posts2);
      renderForum();
      const box = document.getElementById('forum-cmt-' + idx);
      if (box) box.classList.add('open');
    });
  });
}
renderForum();

document.getElementById('forumPostBtn').addEventListener('click', () => {
  const input = document.getElementById('forumInput');
  const text = input.value.trim();
  if (!text) return;
  const posts = getForumPosts();
  posts.push({ author: '我', text, time: new Date().toLocaleString('zh'), likes: 0, comments: [] });
  saveForumPosts(posts);
  input.value = '';
  renderForum();
});

// ===== chat =====
const chatApplyBtn = document.getElementById('chatApplyBtn');
const chatStatus = document.getElementById('chatStatus');
const chatApplyBox = document.getElementById('chatApplyBox');
const chatRoom = document.getElementById('chatRoom');
const chatApprovedKey = 'club_chat_approved_' + club.id;

function openChatRoom() {
  chatApplyBox.style.display = 'none';
  chatRoom.classList.add('open');
  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML = club.chatMsgs.map(m => `
    <div class="chat-msg ${m.mine ? 'chat-msg-mine' : ''}">
      <div class="chat-msg-avatar">${m.from[0]}</div>
      <div class="chat-bubble ${m.mine ? 'chat-bubble-mine' : 'chat-bubble-theirs'}">${escHtml(m.text)}</div>
    </div>`).join('');
  msgs.scrollTop = msgs.scrollHeight;
}

if (localStorage.getItem(chatApprovedKey)) openChatRoom();

chatApplyBtn.addEventListener('click', () => {
  chatApplyBtn.disabled = true;
  chatStatus.textContent = '申请已提交，等待管理员审核…';
  setTimeout(() => {
    chatStatus.textContent = '✓ 申请已通过！正在进入聊天室…';
    setTimeout(() => {
      localStorage.setItem(chatApprovedKey, '1');
      openChatRoom();
    }, 800);
  }, 2000);
});

const chatInput = document.getElementById('chatInput');
const chatSendBtn = document.getElementById('chatSendBtn');
function sendChatMsg() {
  const text = chatInput.value.trim();
  if (!text) return;
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg chat-msg-mine';
  div.innerHTML = `<div class="chat-msg-avatar">我</div><div class="chat-bubble chat-bubble-mine">${escHtml(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  chatInput.value = '';
}
chatSendBtn.addEventListener('click', sendChatMsg);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChatMsg(); });

}); // DOMContentLoaded
</script>
</body>
</html>
