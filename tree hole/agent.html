<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent — MUST树洞</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .agent-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: calc(100vh - 64px);
      max-width: 100%;
    }

    /* ===== 左侧会话列表 ===== */
    .agent-sidebar {
      border-right: 1px solid var(--border);
      background: var(--bg);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .agent-sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .agent-sidebar-title { font-weight: 700; font-size: 1rem; }
    .new-chat-btn {
      width: 30px; height: 30px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: var(--transition); color: var(--text-muted);
    }
    .new-chat-btn:hover { background: var(--hover-bg); color: var(--text); }

    .chat-list { flex: 1; overflow-y: auto; padding: 8px; }
    .chat-list-item {
      padding: 10px 12px; border-radius: var(--radius);
      cursor: pointer; transition: var(--transition);
      font-size: 0.9rem; color: var(--text);
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 2px;
    }
    .chat-list-item:hover { background: var(--hover-bg); }
    .chat-list-item.active { background: var(--bg-inset); font-weight: 500; }
    .chat-list-item i { color: var(--text-muted); font-size: 0.85rem; flex-shrink: 0; }
    .chat-list-item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chat-list-item-time { font-size: 0.72rem; color: var(--text-light); flex-shrink: 0; }

    .agent-sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem; color: var(--text-muted);
      display: flex; align-items: center; gap: 8px;
    }

    /* ===== 右侧聊天区 ===== */
    .agent-main {
      display: flex; flex-direction: column;
      background: var(--bg-subtle); overflow: hidden;
    }

    .agent-topbar {
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .agent-model-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border: 1px solid var(--border);
      border-radius: 20px; font-size: 0.82rem; color: var(--text-muted);
      background: var(--bg-subtle);
    }
    .agent-model-badge .dot {
      width: 7px; height: 7px; border-radius: 50%; background: #2ea043;
    }
    .agent-topbar-title { font-weight: 600; font-size: 1rem; flex: 1; }

    /* 消息区 */
    .agent-messages {
      flex: 1; overflow-y: auto;
      padding: 24px 20px;
      display: flex; flex-direction: column; gap: 20px;
    }

    /* 欢迎屏 */
    .agent-welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px; text-align: center;
    }
    .agent-welcome-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--text); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; margin-bottom: 20px;
    }
    .agent-welcome h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .agent-welcome p { color: var(--text-muted); font-size: 0.97rem; margin-bottom: 28px; }
    .suggestion-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      max-width: 520px; width: 100%;
    }
    .suggestion-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 14px 16px;
      cursor: pointer; transition: var(--transition); text-align: left;
    }
    .suggestion-card:hover { border-color: #888; box-shadow: var(--shadow-sm); }
    .suggestion-card-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
    .suggestion-card-sub { font-size: 0.8rem; color: var(--text-muted); }

    /* 消息气泡 */
    .msg-group { display: flex; gap: 12px; max-width: 780px; width: 100%; }
    .msg-group.user-group { flex-direction: row-reverse; margin-left: auto; }
    .msg-group-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; font-weight: 700;
    }
    .agent-avatar-icon { background: var(--text); color: #fff; }
    .user-avatar-icon { background: var(--bg-inset); border: 1px solid var(--border); color: var(--text); }
    .msg-group-body { flex: 1; min-width: 0; }
    .msg-group-name { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 4px; }
    .user-group .msg-group-name { text-align: right; }
    .msg-bubble-agent {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
      padding: 12px 16px; font-size: 0.95rem; line-height: 1.7;
      color: var(--text); word-break: break-word;
    }
    .msg-bubble-user {
      background: var(--text); color: #fff;
      border-radius: var(--radius-lg) 0 var(--radius-lg) var(--radius-lg);
      padding: 12px 16px; font-size: 0.95rem; line-height: 1.7;
      word-break: break-word; display: inline-block;
    }
    .user-group .msg-group-body { display: flex; flex-direction: column; align-items: flex-end; }

    /* 打字动画 */
    .typing-indicator {
      display: flex; gap: 4px; padding: 14px 16px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
      width: fit-content;
    }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.2s ease infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* 输入栏 */
    .agent-input-area {
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 16px 20px;
    }
    .agent-input-box {
      background: var(--bg-subtle); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      transition: var(--transition);
    }
    .agent-input-box:focus-within { border-color: #888; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); background: var(--bg); }
    .agent-textarea {
      width: 100%; padding: 12px 16px; border: none; outline: none;
      font-size: 0.97rem; background: transparent; color: var(--text);
      resize: none; min-height: 52px; max-height: 160px;
      font-family: inherit; line-height: 1.6;
    }
    .agent-input-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; border-top: 1px solid var(--border-muted);
    }
    .agent-input-tools { display: flex; gap: 4px; }
    .agent-tool-btn {
      width: 30px; height: 30px; border-radius: var(--radius);
      border: none; background: transparent; color: var(--text-muted);
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }
    .agent-tool-btn:hover { background: var(--hover-bg); color: var(--text); }
    .agent-send-btn {
      width: 34px; height: 34px; border-radius: var(--radius);
      border: none; background: var(--text); color: #fff;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
    }
    .agent-send-btn:hover { background: #333; }
    .agent-send-btn:disabled { background: var(--bg-inset); color: var(--text-muted); cursor: not-allowed; }
    .agent-input-hint {
      font-size: 0.75rem; color: var(--text-light); margin-top: 8px; text-align: center;
    }

    @media (max-width: 768px) {
      .agent-layout { grid-template-columns: 1fr; }
      .agent-sidebar { display: none; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="nav-logo">
    <i class="fas fa-tree"></i> Azurecanvas-树洞
    <span class="badge">MUST</span>
  </div>
  <div class="nav-actions" style="margin-left:auto">
    <button class="btn" onclick="window.location.href='index.html'">
      <i class="fas fa-arrow-left"></i> 返回主页
    </button>
  </div>
</nav>

<div class="agent-layout">
  <!-- 左侧会话列表 -->
  <div class="agent-sidebar">
    <div class="agent-sidebar-header">
      <span class="agent-sidebar-title">对话历史</span>
      <button class="new-chat-btn" id="newChatBtn" title="新建对话">
        <i class="fas fa-plus"></i>
      </button>
    </div>
    <div class="chat-list" id="chatList">
      <div class="chat-list-item active">
        <i class="fas fa-comment-dots"></i>
        <span class="chat-list-item-text">新对话</span>
        <span class="chat-list-item-time">刚刚</span>
      </div>
    </div>
    <div class="agent-sidebar-footer">
      <i class="fas fa-robot"></i>
      MUST 树洞 AI 助手
    </div>
  </div>

  <!-- 右侧聊天区 -->
  <div class="agent-main">
    <div class="agent-topbar">
      <span class="agent-topbar-title" id="chatTitle">新对话</span>
      <div class="agent-model-badge">
        <span class="dot"></span> MUST-Agent v1.0
      </div>
    </div>

    <!-- 消息区 / 欢迎屏 -->
    <div class="agent-messages" id="agentMessages">
      <div class="agent-welcome" id="agentWelcome">
        <div class="agent-welcome-icon"><i class="fas fa-robot"></i></div>
        <h2>你好，我是 MUST 树洞 Agent</h2>
        <p>我可以帮你解答校园问题、倾听烦恼、提供建议</p>
        <div class="suggestion-grid">
          <div class="suggestion-card" data-prompt="图书馆怎么预约座位？">
            <div class="suggestion-card-title">📚 图书馆预约</div>
            <div class="suggestion-card-sub">怎么预约图书馆座位？</div>
          </div>
          <div class="suggestion-card" data-prompt="最近压力很大，有什么解压方法推荐吗？">
            <div class="suggestion-card-title">💆 解压建议</div>
            <div class="suggestion-card-sub">最近压力很大怎么办？</div>
          </div>
          <div class="suggestion-card" data-prompt="帮我写一篇关于校园生活的树洞帖子">
            <div class="suggestion-card-title">✍️ 帮我写帖子</div>
            <div class="suggestion-card-sub">生成一条树洞内容</div>
          </div>
          <div class="suggestion-card" data-prompt="期末复习有什么高效方法？">
            <div class="suggestion-card-title">🎓 学习方法</div>
            <div class="suggestion-card-sub">期末复习高效技巧</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 输入栏 -->
    <div class="agent-input-area">
      <div class="agent-input-box">
        <textarea class="agent-textarea" id="agentInput"
          placeholder="向 MUST Agent 提问…" rows="1"></textarea>
        <div class="agent-input-footer">
          <div class="agent-input-tools">
            <button class="agent-tool-btn" title="上传图片"><i class="far fa-image"></i></button>
            <button class="agent-tool-btn" title="表情"><i class="far fa-smile"></i></button>
            <button class="agent-tool-btn" title="清空对话" id="clearChatBtn"><i class="fas fa-trash-alt"></i></button>
          </div>
          <button class="agent-send-btn" id="agentSendBtn" disabled>
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
      <div class="agent-input-hint">MUST Agent 仅供参考，不代表官方意见</div>
    </div>
  </div>
</div>

<script>
const MOCK_RESPONSES = [
  "这是个很好的问题！根据我的了解，你可以尝试以下几个方法：\n\n1. 提前规划时间，避免临时抱佛脚\n2. 和同学组成学习小组互相监督\n3. 适当休息，保持良好的作息规律\n\n希望对你有帮助 😊",
  "我理解你的感受，校园生活确实有很多压力。建议你可以：\n\n• 找朋友倾诉，不要一个人扛\n• 尝试运动，跑步或打球都很解压\n• 写树洞也是很好的方式，把心里话说出来\n\n你不是一个人在战斗 💪",
  "关于这个问题，我有几点建议供你参考：\n\n首先，了解清楚具体的规则和流程很重要。其次，可以向学长学姐请教经验。最后，保持积极的心态，相信自己能解决！\n\n有什么具体问题可以继续问我 🌟",
  "哈哈，这个问题问得好！其实很多同学都有同样的困惑。\n\n简单来说：**做好时间管理** 是关键。可以用番茄工作法，25分钟专注 + 5分钟休息，效率会提升很多。\n\n加油！你一定可以的 🎯",
  "我明白你的心情。有时候校园生活会让人感到迷茫，这很正常。\n\n重要的是：**不要和别人比较**，每个人都有自己的节奏。专注于自己的成长，一步一步来。\n\n树洞永远是你倾诉的地方 🌳",
];

let messages = [];
let isTyping = false;
let chatSessions = [{ id: 1, title: "新对话", messages: [] }];
let currentSession = 0;

const agentMessages = document.getElementById("agentMessages");
const agentWelcome = document.getElementById("agentWelcome");
const agentInput = document.getElementById("agentInput");
const agentSendBtn = document.getElementById("agentSendBtn");

agentInput.addEventListener("input", () => {
  agentSendBtn.disabled = !agentInput.value.trim() || isTyping;
  agentInput.style.height = "auto";
  agentInput.style.height = Math.min(agentInput.scrollHeight, 160) + "px";
});

agentInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

agentSendBtn.addEventListener("click", sendMessage);

document.querySelectorAll(".suggestion-card").forEach(card => {
  card.addEventListener("click", () => {
    agentInput.value = card.dataset.prompt;
    agentSendBtn.disabled = false;
    sendMessage();
  });
});

document.getElementById("newChatBtn").addEventListener("click", () => {
  messages = [];
  agentMessages.innerHTML = "";
  agentMessages.appendChild(agentWelcome);
  agentWelcome.style.display = "flex";
  document.getElementById("chatTitle").textContent = "新对话";
  const item = document.createElement("div");
  item.className = "chat-list-item active";
  item.innerHTML = `<i class="fas fa-comment-dots"></i><span class="chat-list-item-text">新对话</span><span class="chat-list-item-time">刚刚</span>`;
  document.querySelectorAll(".chat-list-item").forEach(i => i.classList.remove("active"));
  document.getElementById("chatList").insertBefore(item, document.getElementById("chatList").firstChild);
});

document.getElementById("clearChatBtn").addEventListener("click", () => {
  if (!messages.length) return;
  if (confirm("确定清空当前对话？")) {
    messages = [];
    agentMessages.innerHTML = "";
    agentMessages.appendChild(agentWelcome);
    agentWelcome.style.display = "flex";
  }
});

function sendMessage() {
  const text = agentInput.value.trim();
  if (!text || isTyping) return;

  agentWelcome.style.display = "none";
  agentInput.value = "";
  agentInput.style.height = "auto";
  agentSendBtn.disabled = true;

  appendMessage("user", text);
  messages.push({ role: "user", text });

  // 更新会话标题
  if (messages.length === 1) {
    const title = text.slice(0, 18) + (text.length > 18 ? "…" : "");
    document.getElementById("chatTitle").textContent = title;
    const activeItem = document.querySelector(".chat-list-item.active .chat-list-item-text");
    if (activeItem) activeItem.textContent = title;
  }

  showTyping();
  const delay = 800 + Math.random() * 1200;
  setTimeout(() => {
    removeTyping();
    const response = MOCK_RESPONSES[Math.floor(Math.random() * MOCK_RESPONSES.length)];
    appendMessage("agent", response);
    messages.push({ role: "agent", text: response });
    isTyping = false;
    agentSendBtn.disabled = !agentInput.value.trim();
  }, delay);
}

function appendMessage(role, text) {
  const isUser = role === "user";
  const group = document.createElement("div");
  group.className = `msg-group ${isUser ? "user-group" : ""}`;
  const avatarClass = isUser ? "user-avatar-icon" : "agent-avatar-icon";
  const avatarContent = isUser ? "我" : '<i class="fas fa-robot"></i>';
  const bubbleClass = isUser ? "msg-bubble-user" : "msg-bubble-agent";
  const name = isUser ? "你" : "MUST Agent";
  const formattedText = text.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
  group.innerHTML = `
    <div class="msg-group-avatar ${avatarClass}">${avatarContent}</div>
    <div class="msg-group-body">
      <div class="msg-group-name">${name}</div>
      <div class="${bubbleClass}">${formattedText}</div>
    </div>`;
  agentMessages.appendChild(group);
  agentMessages.scrollTop = agentMessages.scrollHeight;
}

function showTyping() {
  isTyping = true;
  const group = document.createElement("div");
  group.className = "msg-group";
  group.id = "typingGroup";
  group.innerHTML = `
    <div class="msg-group-avatar agent-avatar-icon"><i class="fas fa-robot"></i></div>
    <div class="msg-group-body">
      <div class="msg-group-name">MUST Agent</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  agentMessages.appendChild(group);
  agentMessages.scrollTop = agentMessages.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typingGroup");
  if (el) el.remove();
}
</script>
</body>
</html>
