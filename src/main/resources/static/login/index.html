<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AzureCanvas - Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Aeonik', sans-serif;
        }

        /* 预加载页面样式 */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #001086 0%, #237bff 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease, visibility 1s;
        }

        #preloader.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .preloader-content {
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #preloader-canvas-container {
            width: 200px;
            height: 200px;
        }

        .loading-text-wrapper {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            color: #78eaff;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 800;
        }

        .loading-label {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #loading-percentage {
            font-size: 1.2rem;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        #progress-bar-fill {
            width: 0%;
            height: 100%;
            background: #78eaff;
            box-shadow: 0 0 15px #78eaff;
            transition: width 0.3s ease;
        }

        #loading-status {
            color: rgba(120, 234, 255, 0.6);
            font-size: 0.8rem;
            text-align: center;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .login-overlay {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            pointer-events: none;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            width: 360px;
            pointer-events: auto;
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-card h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #ff00ff;
            background: rgba(255, 255, 255, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
            "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js"
        }
    }
    </script>
</head>
<body>
    <!-- 预加载动画页面 -->
    <div id="preloader">
        <div class="preloader-content">
            <div id="preloader-canvas-container"></div>
            <div class="loading-text-wrapper">
                <span class="loading-label">Loading</span>
                <span id="loading-percentage">0%</span>
            </div>
            <div class="progress-bar-container">
                <div id="progress-bar-fill"></div>
            </div>
            <div id="loading-status">Initializing environment...</div>
        </div>
    </div>

    <div id="canvas-container"></div>
    
    <div class="login-overlay">
        <form class="login-card">
            <h1>AZURE CANVAS</h1>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <div class="login-footer">
                注册账号
            </div>
            <div class="checkbox">
                <input type="checkbox" id="inputcheckbox">
                <label for="inputcheckbox">Remember Me</label>
            </div>
            <button type="submit" class="login-btn">ENTER SYSTEM</button>

        </form>

    </div>

    <script src="../js/notifications.js"></script>
    <script type="module">
        import { Preloader } from '../js/effects/preloader.js';
        window.Preloader = Preloader;
        Preloader.init();
    </script>
    <script type="module" src="../js/laserchannel/login-tunnel.js"></script>
    <script src="../js/login.logic.js"></script>
</body>
</html>
