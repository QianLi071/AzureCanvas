# NGINX 配置文件
# 用于解决跨域问题，支持带 cookie 的请求

worker_processes  1;
events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 1. 客户端请求头缓冲区优化：确保能接收包含大量 Cookie 的大型 Header
    client_header_buffer_size 16k;
    large_client_header_buffers 4 64k;

    # 日志配置
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  logs/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # 服务器配置
    server {
        listen       3000;
        server_name  localhost;

        # 设置静态资源根目录，指向项目的 static 文件夹
        root   E:/X19/Development/Web/AzureCanvas/src/main/resources/static;
        index  index.html index.htm;

        # 根目录配置：支持 .html 后缀自动补全/隐藏
        location / {
            # 1. 尝试访问原始路径 ($uri)
            # 2. 尝试添加 .html 后缀访问 ($uri.html)
            # 3. 尝试作为目录访问 ($uri/)
            # 4. 如果都找不到，返回 404
            try_files $uri $uri.html $uri/ =404;
        }

        # 反向代理到后端 API 服务器 (8088 端口)
        location /api/ {
            proxy_pass https://api.szsummer.com;
            
            # 2. 确保请求头完整转发
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 3. 核心：将客户端请求中的 Cookie 显式转发到后端
            proxy_set_header Cookie $http_cookie;

            # 4. 响应头缓冲区优化：防止 Set-Cookie 过长导致响应头被截断
            proxy_buffer_size 16k;
            proxy_buffers 4 32k;
            proxy_busy_buffers_size 64k;

            # 确保 upstream 响应头中的 Set-Cookie 不被忽略
            proxy_pass_header Set-Cookie;

            # 5. Cookie 属性重写与映射
            # 将后端 Set-Cookie 中的 Domain 属性从后端 IP 替换为当前访问域名 (localhost)
            proxy_cookie_domain 192.168.1.100 localhost;
            # 将后端 Set-Cookie 中的 Path 属性映射到 /api/，确保浏览器能正确存储并返回
            proxy_cookie_path / /api/;

            # 6. CORS 跨域配置优化
            # 注意：Access-Control-Allow-Origin 必须为具体域名，且与 Allow-Credentials 配合使用
            add_header Access-Control-Allow-Origin "http://localhost:3000" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Content-Length, Accept-Encoding, X-CSRF-Token, Authorization, X-XSRF-TOKEN" always;
            add_header Access-Control-Allow-Credentials "true" always;
            # 暴露 Set-Cookie 头，允许前端 JS 访问（若需要）及浏览器正常处理
            add_header Access-Control-Expose-Headers "Set-Cookie" always;

            # 处理 OPTIONS 预检请求
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "http://localhost:3000" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Origin, Content-Type, Content-Length, Accept-Encoding, X-CSRF-Token, Authorization, X-XSRF-TOKEN" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        # 静态资源路径优化
        location /static/ {
            alias E:/X19/Development/Web/AzureCanvas/src/main/resources/static/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # 错误页面
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}